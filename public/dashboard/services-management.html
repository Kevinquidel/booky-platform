<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booky — Gestión de Servicios</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Barra de Navegación del Panel Admin -->
    <header class="bg-gray-900 text-white shadow-md">
        <div class="w-full px-6 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold">Booky — Gestión de Servicios</h1>
            <nav class="flex gap-4">
                <a href="panel-admn.html" id="nav-usuarios" class="text-sm text-gray-300 hover:text-white px-3 py-1.5 rounded transition">Usuarios</a>
                <a href="appointments-management.html" class="text-sm text-gray-300 hover:text-white px-3 py-1.5 rounded transition">Citas</a>
                <a href="services-management.html" class="text-sm text-gray-300 hover:text-white px-3 py-1.5 rounded transition">Servicios</a>
                <a href="../index.html" class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded transition">Volver al sitio</a>
            </nav>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="w-full px-4 sm:px-6 lg:px-8 py-8">
        <!-- Contenedor dinámico principal con grid que se ajusta a 1 o 3 columnas -->
        <div id="main-grid-container" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Formulario para Agregar/Editar Servicio -->
            <div id="service-form-container" class="bg-white rounded-lg shadow p-6 h-fit">
                <h2 id="form-title" class="text-xl font-semibold text-gray-800 mb-4">Agregar Nuevo Servicio</h2>
                <form id="service-form" class="space-y-4">
                    
                    <!-- Único campo obligatorio -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Servicio <span class="text-red-500">*</span></label>
                        <input type="text" id="service-name" required class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="Ej. Asesoría Personalizada">
                    </div>

                    <!-- OPCIÓN DE PRECIO Y MONEDA -->
                    <div class="border border-gray-200 rounded-lg p-3 bg-gray-50/50">
                        <div class="flex items-center justify-between mb-2">
                            <label class="text-sm font-medium text-gray-800 flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="toggle-price" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                Incluir Precio y Moneda
                            </label>
                        </div>
                        <div id="container-price" class="space-y-3 hidden mt-2 pt-2 border-t border-gray-200">
                            <div>
                                <label class="block text-xs font-medium text-gray-600 mb-1">Precio</label>
                                <input type="number" step="any" id="service-price" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="Ej. 50.00">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-600 mb-1">Moneda del Mundo</label>
                                <select id="service-currency" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm focus:ring-blue-500 focus:border-blue-500">
                                    <optgroup label="América">
                                        <option value="USD">USD - Dólar estadounidense ($)</option>
                                        <option value="COP" selected>COP - Peso colombiano ($)</option>
                                        <option value="MXN">MXN - Peso mexicano ($)</option>
                                        <option value="ARS">ARS - Peso argentino ($)</option>
                                        <option value="CLP">CLP - Peso chileno ($)</option>
                                        <option value="PEN">PEN - Sol peruano (S/)</option>
                                        <option value="BRL">BRL - Real brasileño (R$)</option>
                                        <option value="CAD">CAD - Dólar canadiense ($)</option>
                                    </optgroup>
                                    <optgroup label="Europa y Otras Regiones">
                                        <option value="EUR">EUR - Euro (€)</option>
                                        <option value="GBP">GBP - Libra esterlina (£)</option>
                                        <option value="JPY">JPY - Yen japonés (¥)</option>
                                        <option value="AUD">AUD - Dólar australiano ($)</option>
                                        <option value="CHF">CHF - Franco suizo (CHF)</option>
                                        <option value="CNY">CNY - Yuan chino (¥)</option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- OPCIÓN DE DURACIÓN -->
                    <div class="border border-gray-200 rounded-lg p-3 bg-gray-50/50">
                        <div class="flex items-center justify-between mb-2">
                            <label class="text-sm font-medium text-gray-800 flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="toggle-duration" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                Incluir Duración
                            </label>
                        </div>
                        <div id="container-duration" class="hidden mt-2 pt-2 border-t border-gray-200">
                            <input type="text" id="service-duration" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="Ej. 45 min, 2 horas">
                        </div>
                    </div>

                    <!-- OPCIÓN DE DESCRIPCIÓN -->
                    <div class="border border-gray-200 rounded-lg p-3 bg-gray-50/50">
                        <div class="flex items-center justify-between mb-2">
                            <label class="text-sm font-medium text-gray-800 flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="toggle-description" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                Incluir Descripción
                            </label>
                        </div>
                        <div id="container-description" class="hidden mt-2 pt-2 border-t border-gray-200">
                            <textarea id="service-description" rows="2" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="Detalles o requisitos del servicio..."></textarea>
                        </div>
                    </div>

                    <!-- OPCIÓN DE CAMPO LIBRE / PERSONALIZADO -->
                    <div class="border border-gray-200 rounded-lg p-3 bg-gray-50/50">
                        <div class="flex items-center justify-between mb-2">
                            <label class="text-sm font-medium text-gray-800 flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="toggle-custom" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                Añadir Campo Libre Personalizado
                            </label>
                        </div>
                        <div id="container-custom" class="space-y-2 hidden mt-2 pt-2 border-t border-gray-200">
                            <input type="text" id="service-custom-label" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-xs focus:ring-blue-500 focus:border-blue-500" placeholder="Nombre del campo (ej. Modalidad, Ubicación, Categoría)">
                            <input type="text" id="service-custom-value" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="Valor (ej. Virtual por Zoom)">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition shadow-sm">Guardar Servicio</button>
                </form>
            </div>

            <!-- Listado Dinámico de Servicios Actuales -->
            <div id="services-list-container" class="bg-white rounded-lg shadow p-6 lg:col-span-2">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Servicios Disponibles</h2>
                <div class="w-full overflow-x-auto">
                    <table class="w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Servicio / Descripción</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Precio / Moneda</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Duración</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Extra Libre</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="services-table-body" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="5" class="px-4 py-4 text-center text-gray-500">Cargando servicios...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- Script de lógica con soporte para campos opcionales dinámicos y control de roles -->
    <script type="module" src="../assets/dist/settings/admin/admin-services.js"></script>
</body>
</html>
