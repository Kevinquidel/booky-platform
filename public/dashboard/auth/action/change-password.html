<!DOCTYPE html>
<html lang="es">

<head>
  <!-- Metadatos -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablezca su contraseña - Booky, plataforma de citas</title>
  <meta name="description" content="Restablecimiento de contraseña seguro en Booky.">
  <meta name="author" content="Booky">
  <meta name="robots" content="index, follow">
  <meta http-equiv="x-content-type-options" content="nosniff">

  <!-- BaseUrl -->
  <script>
    const baseUrl = '/';
    const imgBaseUrl = `${baseUrl}assets/img`;
    const cssBaseUrl = `${baseUrl}assets/css`;
    const jsBaseUrl = `${baseUrl}assets/dist`;
  </script>

  <!-- Estilos -->
  <link rel="stylesheet" href="/assets/css/settings/auth/action/change-verifications.css">
  <link rel="stylesheet" href="/assets/css/general/footer.css">
  <link rel="stylesheet" href="/assets/css/general/funciones/notification.css">
  <link rel="stylesheet" href="/assets/css/general/panel.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/img/web/favicon.ico">
</head>

<body>

  <!-- Contenedor de estilo -->
  <div id="styleContainer" class="register-container">
    <div class="register-form">

        <!-- Formulario de Restablecimiento de Contraseña -->
        <div class="reset-password-container">
          <h2 class="reset-password-title">Restablecer contraseña</h2>
          <form id="changePasswordForm">
            <div id="errorMessageResetPassword" class="error-message"></div>

            <label for="newPassword">Nueva contraseña:</label>
            <input type="password" id="newPassword" name="newPassword" required>

            <label for="confirmPassword">Confirmar contraseña:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>

            <button type="submit" id="resetPasswordButton" class="submit-button">Restablecer contraseña</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Pie de página -->
  <footer>
    <nav class="footer-navigation" id="footer-navigation">
      <ul id="footer-menu"></ul>
    </nav>
    <div id="toggle-button" class="icon-button">
      <img src="/assets/img/nav/sidebar-top.svg" alt="Icono de menú">
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/assets/dist/settings/auth/reset-password.js" type="module" async></script>
  <script src="/assets/dist/general/footer.js" type="module" async></script>
  <script src="/assets/dist/general/funciones/notificaciones.js" defer></script>

</body>

</html>
